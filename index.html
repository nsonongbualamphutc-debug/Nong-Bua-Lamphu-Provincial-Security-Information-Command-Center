<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1d3d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ยาเสพติด นภ.">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ศูนย์ข้อมูลสถานการณ์ยาเสพติด จังหวัดหนองบัวลำภู</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --ink:#10203f; --ink2:#3a4a66; --line:#e4e9f2; --bg:#eaeef6; --card:#ffffff; --soft:#f4f7fc;
    --navy:#0f1d3d; --navy2:#1b2f5e;
    --enf:#c0392b; --enfbg:#fdeceb; --tx:#0e8a6b; --txbg:#e6f6f0;
    --watch:#cf8a1e; --watchbg:#fbf2dd; --seize:#2f6fb0; --seizebg:#e8f1fa;
    --scr:#7b54b8; --scrbg:#efeafa;
    --muted:#6c7689; --gold:#d8a64a;
    --radius:18px; --shadow:0 1px 2px rgba(16,32,63,.06),0 12px 34px rgba(16,32,63,.08);
    --ic:38px;
  }
  [data-theme="dark"]{
    --ink:#e9edf6; --ink2:#aeb9cf; --line:#26324c; --bg:#0a1120; --card:#121c30; --soft:#18233a;
    --navy:#0a1426; --navy2:#16264a;
    --enf:#e8705f; --enfbg:#2b1a18; --tx:#3fc59b; --txbg:#11261f;
    --watch:#e2b455; --watchbg:#2a2310; --seize:#5f9bd6; --seizebg:#13243a;
    --scr:#a78bdf; --scrbg:#231a33;
    --muted:#8b97ae; --gold:#e0b75e;
    --shadow:0 1px 2px rgba(0,0,0,.35),0 14px 34px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(180deg,var(--soft),var(--bg)) fixed;font-family:'Sarabun',sans-serif;color:var(--ink);transition:.3s background,.3s color}
  .wrap{max-width:1360px;margin:0 auto;padding:0 18px 72px}
  .ic{width:1em;height:1em;flex:none;vertical-align:-.14em}
  /* ===== HERO ===== */
  .hero{background:
        radial-gradient(120% 140% at 85% -10%,rgba(216,166,74,.22),transparent 45%),
        radial-gradient(90% 120% at 0% 120%,rgba(192,57,43,.20),transparent 50%),
        linear-gradient(135deg,var(--navy),var(--navy2));
        color:#eef3ff;border-radius:0 0 26px 26px;padding:22px 26px 24px;margin-bottom:18px;
        box-shadow:0 18px 40px rgba(15,29,61,.28),inset 0 -3px 0 var(--gold);position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-40px;top:50%;transform:translateY(-50%);width:300px;height:300px;background:url('ตราหนองบัวลำภู.png') center/contain no-repeat;opacity:.07;pointer-events:none}
  .hero::before{content:"";position:absolute;inset:0;background:
        repeating-linear-gradient(90deg,rgba(255,255,255,.03) 0 1px,transparent 1px 46px);pointer-events:none}
  .hbar{display:flex;align-items:center;gap:15px;flex-wrap:wrap;position:relative}
  .crest{width:54px;height:54px;border-radius:15px;background:linear-gradient(135deg,#fff,#dfe7f7);
          display:grid;place-items:center;color:var(--navy);font-family:'Kanit';font-weight:800;font-size:20px;
          box-shadow:0 6px 18px rgba(0,0,0,.25);letter-spacing:-.5px}
  .htxt h1{font-family:'Kanit';font-weight:700;font-size:clamp(1.12rem,4.2vw,1.5rem);margin:0;line-height:1.18;letter-spacing:-.01em}
  .htxt p{margin:4px 0 0;color:#aebede;font-size:.85rem;display:flex;align-items:center;gap:7px}
  .htools{margin-left:auto;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .live{display:inline-flex;align-items:center;gap:8px;font-size:.78rem;color:#cdd9f2;
        background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);padding:7px 13px;border-radius:30px}
  .pulse{width:9px;height:9px;border-radius:50%;background:#36d39e;box-shadow:0 0 0 0 rgba(54,211,158,.6);animation:pulse 2.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(54,211,158,.5)}70%{box-shadow:0 0 0 9px rgba(54,211,158,0)}100%{box-shadow:0 0 0 0 rgba(54,211,158,0)}}
  .hbtn{font-family:'Kanit';font-weight:600;font-size:.83rem;border:1px solid rgba(255,255,255,.18);
        background:rgba(255,255,255,.07);color:#eaf0ff;padding:8px 14px;border-radius:11px;cursor:pointer;
        text-decoration:none;display:inline-flex;align-items:center;gap:7px;transition:.15s;font-size:.84rem}
  .hbtn .ic{font-size:1rem}
  .hbtn:hover{background:rgba(255,255,255,.16)}
  .hbtn.cta{background:var(--gold);color:#3a2a08;border-color:var(--gold)}
  .hbtn.cta:hover{filter:brightness(1.07)}
  /* ribbon headline */
  .ribbon{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;position:relative}
  .rcell{flex:1 1 150px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
         border-radius:13px;padding:11px 15px;backdrop-filter:blur(4px)}
  .rcell .rl{font-size:.72rem;color:#a9bbe0;display:flex;align-items:center;gap:6px}
  .rcell .rl .ic{font-size:.95rem;color:var(--gold)}
  .rcell .rv{font-family:'Kanit';font-weight:700;font-size:1.32rem;margin-top:2px;font-variant-numeric:tabular-nums}
  .rcell .ru{font-size:.7rem;color:#9fb1d8;font-weight:400}
  /* ===== filters ===== */
  .filters{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;background:var(--card);border:1px solid var(--line);
           border-radius:var(--radius);box-shadow:var(--shadow);padding:15px 18px;margin-bottom:18px}
  .filters .fld{display:flex;flex-direction:column;gap:5px}
  .filters label{font-size:.73rem;font-weight:600;color:var(--muted)}
  .filters select{padding:9px 13px;border:1px solid var(--line);border-radius:11px;background:var(--soft);
                  color:var(--ink);font-family:inherit;font-size:.9rem;min-width:150px}
  .updtxt{margin-left:auto;font-size:.78rem;color:var(--muted);align-self:center;display:flex;align-items:center;gap:6px}
  /* ===== AI ===== */
  .ai{background:linear-gradient(135deg,#13234a,#21407e);color:#eaf0ff;border-radius:var(--radius);
      box-shadow:var(--shadow);padding:22px 26px;margin-bottom:18px;position:relative;overflow:hidden}
  [data-theme="dark"] .ai{background:linear-gradient(135deg,#0e1a33,#1a2e58)}
  .ai::after{content:"";position:absolute;right:-30px;top:-40px;width:200px;height:200px;border-radius:50%;
             background:radial-gradient(circle,rgba(216,166,74,.16),transparent 70%)}
  .ai h2{font-family:'Kanit';font-weight:600;font-size:1.06rem;margin:0;display:flex;align-items:center;gap:10px}
  .ai h2 .iccirc{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.13);display:grid;place-items:center}
  .ai h2 .iccirc .ic{font-size:1.15rem;color:var(--gold)}
  .ai .badge{font-size:.65rem;background:rgba(255,255,255,.16);padding:3px 10px;border-radius:20px;font-weight:500}
  .ai .period{font-size:.8rem;opacity:.82;margin:6px 0 14px;padding-left:44px}
  .ai .body{font-size:.96rem;line-height:1.78}
  .ai .body b{color:#fff} .ai .hl{color:var(--gold);font-weight:600}
  .ai .body .ln{display:block;margin:8px 0;padding-left:24px;position:relative}
  .ai .body .ln::before{content:"";position:absolute;left:6px;top:9px;width:7px;height:7px;border-radius:50%;
        background:#7fa0e6;box-shadow:0 0 0 3px rgba(127,160,230,.2)}
  .ai .body .ln.warn::before{background:var(--gold);box-shadow:0 0 0 3px rgba(216,166,74,.25)}
  .ai .copybtn{position:absolute;top:20px;right:22px;font-family:'Kanit';font-size:.78rem;font-weight:600;
        background:rgba(255,255,255,.14);color:#fff;border:none;padding:8px 15px;border-radius:10px;cursor:pointer;
        display:inline-flex;align-items:center;gap:6px}
  .ai .copybtn:hover{background:rgba(255,255,255,.27)}
  .ai .aibtns{position:absolute;top:18px;right:20px;display:flex;gap:8px;z-index:2}
  .ai .aibtns .copybtn{position:static}
  /* ===== KPI ===== */
  .kpis{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:18px}
  @media(max-width:680px){.kpis{grid-template-columns:repeat(2,minmax(0,1fr))}}
  @media(max-width:380px){.kpis{grid-template-columns:1fr}}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
       padding:16px 17px;display:flex;gap:14px;align-items:flex-start;position:relative;overflow:hidden;transition:.2s}
  .kpi:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(16,32,63,.1),0 18px 40px rgba(16,32,63,.1)}
  .kpi .ibox{width:var(--ic);height:var(--ic);border-radius:12px;display:grid;place-items:center;flex:none}
  .kpi .ibox .ic{font-size:1.3rem}
  .kpi .kmain{flex:1;min-width:0}
  .kpi .k-top{font-size:.8rem;color:var(--muted);font-weight:600;line-height:1.2}
  .kpi .k-val{font-family:'Kanit';font-weight:700;font-size:1.7rem;line-height:1.15;margin:5px 0 1px;font-variant-numeric:tabular-nums}
  .kpi .k-unit{font-size:.7rem;color:var(--muted);font-weight:400}
  .kpi .k-delta{font-size:.74rem;font-weight:600;display:inline-flex;align-items:center;gap:4px}
  .up{color:var(--enf)} .down{color:var(--tx)} .flat{color:var(--muted)}
  .i-enf{background:linear-gradient(140deg,var(--enfbg),var(--card));color:var(--enf)} .i-tx{background:linear-gradient(140deg,var(--txbg),var(--card));color:var(--tx)}
  .i-watch{background:linear-gradient(140deg,var(--watchbg),var(--card));color:var(--watch)} .i-seize{background:linear-gradient(140deg,var(--seizebg),var(--card));color:var(--seize)}
  /* ===== cards ===== */
  .row{display:grid;gap:16px;margin-bottom:18px}
  .row.r2{grid-template-columns:1.25fr 1fr} .row.r2b{grid-template-columns:1fr 1fr}
  @media(max-width:980px){.row.r2,.row.r2b{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 22px}
  .card h3{font-family:'Kanit';font-weight:600;font-size:1.02rem;margin:0;display:flex;align-items:center;gap:9px}
  .card h3 .ic{font-size:1.2rem;color:var(--seize)}
  .card .csub{color:var(--muted);font-size:.8rem;margin:3px 0 16px;padding-left:30px}
  /* progress */
  .goal{margin-bottom:20px}.goal:last-child{margin-bottom:0}
  .goal .glabel{display:flex;justify-content:space-between;align-items:baseline;font-size:.88rem;margin-bottom:8px}
  .goal .glabel .gname{font-weight:600;font-family:'Kanit';display:flex;align-items:center;gap:7px}
  .goal .glabel .gnum{font-variant-numeric:tabular-nums;color:var(--muted)}
  .goal .gnum b{color:var(--ink);font-size:1.08rem}
  .track{height:14px;background:var(--soft);border-radius:20px;overflow:hidden;border:1px solid var(--line)}
  .fill{height:100%;border-radius:20px;transition:width .7s cubic-bezier(.4,0,.2,1);position:relative}
  .fill.enf{background:linear-gradient(90deg,#d9594b,#c0392b)} .fill.tx{background:linear-gradient(90deg,#23bf95,#0e8a6b)}
  .fill::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
        background-size:40px 100%;background-repeat:no-repeat;animation:sheen 2.4s infinite}
  @keyframes sheen{0%{background-position:-40px 0}100%{background-position:calc(100% + 40px) 0}}
  .gpct{font-family:'Kanit';font-weight:700;font-size:.84rem;min-width:48px;text-align:right}
  /* ===== การ์ดการดำเนินงานตามเป้าหมาย (พรีเมียม) ===== */
  .g2{position:relative;border-radius:15px;padding:15px 16px 16px;margin-bottom:15px;background:linear-gradient(180deg,#ffffff,#fafcff);border:1px solid var(--line);overflow:hidden;box-shadow:0 3px 12px rgba(15,29,61,.045)}
  .g2:last-child{margin-bottom:0}
  .g2::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px}
  .g2.enf::before{background:linear-gradient(180deg,#e0503a,#c0392b)}
  .g2.tx::before{background:linear-gradient(180deg,#23bf95,#0e8a6b)}
  .g2-top{display:flex;align-items:center;gap:11px}
  .g2-ic{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;flex:none;box-shadow:0 3px 8px rgba(15,29,61,.16)}
  .g2.enf .g2-ic{background:linear-gradient(135deg,#e86a58,#c0392b)}
  .g2.tx .g2-ic{background:linear-gradient(135deg,#31cfa3,#0e8a6b)}
  .g2-ic svg{width:17px;height:17px}
  .g2-name{font-family:'Kanit';font-weight:600;font-size:.96rem;color:var(--ink);flex:1;line-height:1.25}
  .g2-pct{font-family:'Kanit';font-weight:800;font-size:1.85rem;line-height:1;letter-spacing:-.5px}
  .g2-numrow{font-size:.86rem;color:var(--muted);margin:9px 0 8px;font-variant-numeric:tabular-nums}
  .g2-numrow b{font-family:'Kanit';color:var(--ink);font-size:1.12rem}
  .g2-bar{height:16px;background:#eef1f6;border-radius:20px;overflow:hidden;border:1px solid var(--line)}
  .g2-fill{height:100%;border-radius:20px;position:relative;transition:width .85s cubic-bezier(.4,0,.2,1)}
  .g2-fill.enf{background:linear-gradient(90deg,#e86a58,#c0392b)}
  .g2-fill.tx{background:linear-gradient(90deg,#31cfa3,#0e8a6b)}
  .g2-fill::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.32),transparent);background-size:40px 100%;background-repeat:no-repeat;animation:sheen 2.4s infinite}
  .g2-dists{display:grid;grid-template-columns:1fr 1fr;gap:9px 14px;margin-top:14px}
  .g2-d{background:#f7f9fc;border:1px solid var(--line);border-radius:10px;padding:8px 11px 9px}
  .g2-drow{display:flex;align-items:baseline;gap:7px;margin-bottom:6px}
  .g2-dn{font-family:'Kanit';font-weight:600;font-size:.82rem;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .g2-dval{font-size:.73rem;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
  .g2-dp{font-family:'Kanit';font-weight:800;font-size:.9rem;white-space:nowrap;min-width:38px;text-align:right}
  .g2-dt{height:7px;background:#e9edf3;border-radius:10px;overflow:hidden}
  .g2-df{display:block;height:100%;border-radius:10px;transition:width .7s ease}
  @media(max-width:560px){.g2-dists{grid-template-columns:1fr}}
  /* ===== เซคชันจิตเวชรายอำเภอ ===== */
  .agchip{font-family:'Kanit';font-weight:600;font-size:.68rem;padding:2px 9px;border-radius:14px;margin-left:6px}
  .agchip.agpol{background:#fdecea;color:#b03427}
  .agchip.aghea{background:#e6f6f0;color:#0e7a55}
  .lastupd{display:inline-flex;align-items:center;gap:6px;font-size:.74rem;color:var(--muted);background:var(--soft);border:1px solid var(--line);border-radius:20px;padding:4px 12px;margin-left:auto;font-family:'Kanit',sans-serif}
  .psy-flow{display:flex;align-items:stretch;gap:10px;flex-wrap:wrap;margin:6px 0 16px}
  .psy-chip{flex:1;min-width:158px;border-radius:14px;padding:14px 16px;background:linear-gradient(180deg,#fff,#faf8ff);border:1px solid var(--line);display:flex;flex-direction:column;gap:1px;box-shadow:0 3px 10px rgba(15,29,61,.04)}
  .psy-chip span{font-size:.79rem;color:var(--muted);font-family:'Kanit',sans-serif}
  .psy-chip b{font-family:'Kanit',sans-serif;font-weight:800;font-size:1.72rem;line-height:1.15}
  .psy-chip i{font-size:.72rem;color:var(--muted);font-style:normal}
  .psy-chip.s1{border-left:4px solid #7b54b8}.psy-chip.s1 b{color:#7b54b8}
  .psy-chip.s2{border-left:4px solid #c0392b}.psy-chip.s2 b{color:#c0392b}
  .psy-chip.s3{border-left:4px solid #0e8a6b}.psy-chip.s3 b{color:#0e8a6b}
  .psy-arrow{display:flex;align-items:center;color:#c3ccda;font-size:1.5rem;font-weight:800}
  @media(max-width:640px){.psy-arrow{display:none}.psy-chip{min-width:0;flex:1 1 46%}}
  .psytbl{width:100%;border-collapse:collapse;font-size:.86rem;min-width:520px}
  .psytbl th{background:#f3eefb;color:#5b3ea0;font-family:'Kanit',sans-serif;font-weight:600;font-size:.82rem;padding:10px 12px;text-align:center;border-bottom:2px solid #e3d8f5}
  .psytbl th:first-child{text-align:left}
  .psytbl td{padding:9px 12px;text-align:center;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
  .psytbl td.pd{text-align:left;font-weight:600;color:var(--ink2);font-family:'Kanit',sans-serif}
  .psytbl td.ppct{font-family:'Kanit',sans-serif;font-weight:700;color:#7b54b8}
  .psytbl tbody tr:hover{background:#faf8ff}
  .psytbl tfoot td{background:#f3eefb;font-family:'Kanit',sans-serif;font-weight:700;color:#3d2a70;border-top:2px solid #e3d8f5}
  .mini{display:grid;grid-template-columns:110px 1fr auto;gap:11px;align-items:center;font-size:.79rem;margin-top:10px}
  .mini .mname{color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mini .mtrack{height:8px;background:var(--soft);border-radius:10px;overflow:hidden}
  .mini .mfill{display:block;height:100%;border-radius:10px;min-width:2px}
  /* notes feed */
  .feed{display:flex;flex-direction:column;gap:11px;max-height:360px;overflow:auto}
  .fitem{border:1px solid var(--line);border-radius:13px;padding:12px 14px;background:var(--soft);position:relative}
  .fitem .fhead{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
  .chip{font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--enfbg);color:var(--enf);font-family:'Kanit'}
  .fitem .fper{font-size:.72rem;color:var(--muted)} .fitem .ftxt{font-size:.88rem;line-height:1.5}
  .fitem .fby{font-size:.71rem;color:var(--muted);margin-top:5px}
  .feedempty{padding:30px;text-align:center;color:var(--muted)}
  /* table */
  table{width:100%;border-collapse:collapse;font-size:.83rem}
  th,td{padding:9px 11px;text-align:right;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums;white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  thead th{background:var(--soft);color:var(--ink2);font-weight:600;font-family:'Kanit';position:sticky;top:0}
  tfoot td{font-weight:700;background:var(--soft);border-top:2px solid var(--line)}
  tbody tr:hover{background:var(--soft)}
  .tablewrap{overflow:auto;border:1px solid var(--line);border-radius:12px;max-height:440px}
  .chartbox{position:relative;height:300px} .chartbox.tall{height:360px}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:.78rem;color:var(--muted);margin-top:10px}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .sw{width:11px;height:11px;border-radius:3px;display:inline-block}
  .note{font-size:.76rem;color:var(--muted);margin-top:10px;line-height:1.5}
  details{margin-bottom:18px}
  details>summary{cursor:pointer;font-family:'Kanit';font-weight:600;font-size:.95rem;padding:14px 20px;
        background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);
        list-style:none;display:flex;align-items:center;gap:9px}
  details>summary::-webkit-details-marker{display:none}
  details>summary .ic{font-size:1.15rem;color:var(--seize)}
  details[open]>summary{border-radius:14px 14px 0 0}
  details .card{border-radius:0 0 14px 14px;border-top:none}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--card);
         padding:11px 22px;border-radius:11px;font-size:.86rem;opacity:0;transition:.25s;z-index:50;pointer-events:none;font-weight:600}
  .toast.show{opacity:1}
  .loading{text-align:center;padding:70px;color:var(--muted)}

/* ===================== JSONP ===================== */
function jsonp(params){return new Promise((res,rej)=>{
  const cb='cb_'+Math.random().toString(36).slice(2);
  const q=Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
  const s=document.createElement('script');let done=false;
  window[cb]=d=>{done=true;res(d);clean();};
  function clean(){delete window[cb];s.remove();}
  s.onerror=()=>{if(!done){rej(new Error('net'));clean();}};
  s.src=API+'?'+q+'&callback='+cb;document.body.appendChild(s);
  setTimeout(()=>{if(!done){rej(new Error('timeout'));clean();}},20000);
});}

/* ===================== โหลด ===================== */
async function refresh(manual){
  try{
    const d=await jsonp({action:'getData'});
    if(!d.ok)throw new Error(d.error||'error');
    ALL=d.rows||[];setLive(true);
    document.getElementById('updTxt').innerHTML=ic('refresh')+' อัปเดต '+new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    render();
    if(manual)toast('รีเฟรชข้อมูลแล้ว');
  }catch(e){
    setLive(false);
    if(!ALL.length)document.getElementById('content').innerHTML=
      `<div class="card loading">${ic('alert')} เชื่อมต่อ API ไม่สำเร็จ<br><span style="font-size:.8rem">โปรดตรวจสอบการ Deploy Web app และสิทธิ์การเข้าถึง (Anyone)</span></div>`;
    if(manual)toast('เชื่อมต่อไม่สำเร็จ');
  }
}

function sum(rows){const o={};FIELDS.forEach(f=>o[f]=0);rows.forEach(r=>FIELDS.forEach(f=>o[f]+=Number(r[f])||0));return o;}
/* รวมแบบไม่ทบยอด: เก็บค่าล่าสุดต่ออำเภอ (ภาพรวมสะสม) แล้วรวมข้ามอำเภอ */
/* ยอดสะสม (ทบยอด): ผลรวมของทุกรายการที่กรอก/นำเข้าในช่วงที่เลือก
   ข้อมูลตั้งต้นที่นำเข้า = ตัวตั้ง แถวที่กรอกเพิ่ม = บวกทบเข้าไป */
function aggLatest(rows){const o={};FIELDS.forEach(f=>o[f]=0);
  rows.forEach(r=>FIELDS.forEach(f=>o[f]+=Number(r[f])||0));return o;}
function filt(y,m,d,w){return ALL.filter(r=>r.year===y&&(m===0||r.month===m)&&(d==='all'||r.district===d)&&(!w||r.week===w));}
/* เชื่อมข้อมูลไร้รอยต่อ: เขียนทับค่าปี 2569 (รายอำเภอ+รวมจังหวัด) ด้วยยอดสะสม live
   จากที่กรอก/นำเข้า → ตาราง กราฟ แผนที่ การ์ด วิ่งพร้อมกันทั้งหมด
   (ปี 2567/2568 = ประวัติคงเดิม, TARGET/เป้าหมาย = คงเดิม) */
function buildLive2569(){
  if(!ALL.some(r=>Number(r.year)===2569))return; /* ยังไม่มีข้อมูลปี 69 → คงค่าตั้งต้น */
  DISTRICTS.forEach(d=>{const g=aggLatest(filt(2569,0,d,0));
    PLAN_ARREST[d].y69={c:g.cases,s:g.suspects,m:g.methPills,i:Math.round(g.iceGrams*100)/100};
    PLAN_TREAT[d].p69=g.intoTreatment;
    PLAN_TREAT[d].pct=PLAN_TREAT[d].t69?g.intoTreatment/PLAN_TREAT[d].t69*100:0;
  });
  let c=0,sp=0,m=0,i=0;DISTRICTS.forEach(d=>{const y=PLAN_ARREST[d].y69;c+=y.c;sp+=y.s;m+=y.m;i+=y.i;});
  HIST[2569].cases=c;HIST[2569].suspects=sp;HIST[2569].meth=m;HIST[2569].ice=Math.round(i*100)/100;
}

function infoDot(k){var t=(TIPS[k]||'').replace(/"/g,'&quot;');return `<span class="infodot" tabindex="0" role="button" aria-label="คำอธิบายข้อมูล" data-tip="${t}" onclick="showTip(event,this)" onmouseenter="showTip(event,this,1)" onmouseleave="hideTip()">i</span>`;}
function ensureTip(){var t=document.getElementById('tipBubble');if(!t){t=document.createElement('div');t.id='tipBubble';t.className='tipBubble';document.body.appendChild(t);}return t;}
function showTip(e,el,hover){if(e&&e.stopPropagation)e.stopPropagation();var tip=el.getAttribute('data-tip');if(!tip)return;var t=ensureTip();
  if(!hover&&t._for===el&&t.classList.contains('on')){hideTip();return;}
  t.textContent=tip;t._for=el;t.style.maxWidth=Math.min(280,(window.innerWidth||360)-24)+'px';
  t.classList.add('on');
  var r=el.getBoundingClientRect();var bw=t.offsetWidth,bh=t.offsetHeight;
  var left=r.left+window.scrollX;var top=r.bottom+window.scrollY+9;
  var vw=window.innerWidth||360;
  if(left+bw>window.scrollX+vw-12)left=window.scrollX+vw-12-bw;
  if(left<window.scrollX+12)left=window.scrollX+12;
  var ax=Math.max(8,Math.min(bw-18,(r.left+r.width/2)-(left-window.scrollX)-5));
  t.style.setProperty('--ax',ax+'px');
  t.style.left=left+'px';t.style.top=top+'px';}
function hideTip(){var t=document.getElementById('tipBubble');if(t)t.classList.remove('on');}
if(typeof document!=='undefined'&&document.addEventListener){
  document.addEventListener('click',function(e){if(e.target&&e.target.closest&&!e.target.closest('.infodot'))hideTip();});
  document.addEventListener('scroll',function(){hideTip();},true);
}

function renderRibbon(c,label){
  const cells=[
    ['cases','คดีจับกุม',c.cases,'คดี'],
    ['suspect','ผู้ต้องหา',c.suspects,'คน'],
    ['dealer','คดีข้อหาร้ายแรง',c.dealers,'ราย'],
    ['treat','นำเข้าบำบัด',c.intoTreatment,'คน'],
    ['pill','ยาบ้า',c.methPills,'เม็ด'],
    ['ice','ไอซ์',c.iceGrams,'กรัม']
  ];
  document.getElementById('ribbon').innerHTML=cells.map(([i,l,v,u])=>
    `<div class="rcell"><div class="rl">${ic(i)} ${l}</div><div class="rv"><span class="cnt" data-c="${v}" data-d="${u==='กรัม'?2:0}">${nf(v)}</span> <span class="ru">${u}</span></div></div>`).join('');
}

/* ---------- KPI ---------- */
function delta(c,p){if(!p)return{t:c>0?'ข้อมูลใหม่':'—',c:'flat',a:''};const d=(c-p)/p*100;
  return{t:Math.abs(d).toFixed(1)+'%',c:d>0?'up':d<0?'down':'flat',a:d>0?'▲':d<0?'▼':'—'};}
function kpi(icon,tone,label,unit,val,prev){
  const dd=delta(val,prev);
  return`<div class="kpi" style="--accent:var(--${tone})"><div class="ibox i-${tone}">${ic(icon)}</div>
    <div class="kmain"><div class="k-top">${label}</div>
    <div class="k-val"><span class="cnt" data-c="${val}" data-d="${unit==='กรัม'?2:0}">${nf(val)}</span> <span class="k-unit">${unit}</span></div>
    <div class="k-delta ${dd.c}">${dd.a} ${dd.t}</div></div></div>`;
}
function kpiCards(c,p){return`<div class="kpis">
  ${kpi('cases','enf','คดีจับกุม','คดี',c.cases,p.cases)}
  ${kpi('suspect','enf','ผู้ต้องหา','คน',c.suspects,p.suspects)}
  ${kpi('dealer','watch','คดีข้อหาร้ายแรง','ราย',c.dealers,p.dealers)}
  ${kpi('pill','seize','ยาบ้า','เม็ด',c.methPills,p.methPills)}
  ${kpi('ice','seize','ไอซ์','กรัม',c.iceGrams,p.iceGrams)}
  ${kpi('brain','enf','ผู้มีอาการจิตเวช (SMI-V)','คน',c.psychiatric,p.psychiatric)}
  ${kpi('screen','watch','ค้นหา/คัดกรอง (Re-X-ray)','คน',c.xray,p.xray)}
  ${kpi('treat','tx','นำเข้าบำบัด','คน',c.intoTreatment,p.intoTreatment)}
  ${kpi('done','tx','ผ่านการบำบัด','คน',c.completedTreatment,p.completedTreatment)}
</div>`;}

/* ---------- เป้าหมาย ---------- */
function goalCard(s,yearRows){
  const byD=d=>aggLatest(yearRows.filter(r=>r.district===d));
  const dealTot=aggLatest(yearRows).dealers, treatTot=aggLatest(yearRows).intoTreatment;
  const tgtDeal=s.district==='all'?TARGET_SUM.dealers:(TARGET.dealers[s.district]||0);
  const tgtTreat=s.district==='all'?TARGET_SUM.treat:(TARGET.treat[s.district]||0);
  const panel=(cat,icon,name,val,tgt,unit,fld,map)=>{
    const pr=tgt?val/tgt*100:0, p=Math.min(pr,100);
    const pcol=!tgt?'#9aa4b4':pr>=90?'#12a150':pr>=60?'#e08a1e':'#d43f37';
    const dists=s.district!=='all'?'':'<div class="g2-dists">'+DISTRICTS.map(d=>{
      const v=byD(d)[fld]||0, t=map[d]||0, dp=t?Math.min(v/t*100,100):0, dpr=t?v/t*100:0;
      const dc=!t?'#9aa4b4':dpr>=90?'#12a150':dpr>=60?'#e08a1e':'#d43f37';
      return `<div class="g2-d">
        <div class="g2-drow"><span class="g2-dn">${DSHORT(d)}</span><span class="g2-dval">${nf(v)}/${nf(t)}</span><span class="g2-dp" style="color:${dc}">${dpr.toFixed(0)}%</span></div>
        <div class="g2-dt"><span class="g2-df" style="width:${dp}%;background:${dc}"></span></div>
      </div>`;}).join('')+'</div>';
    return `<div class="g2 ${cat}">
      <div class="g2-top"><span class="g2-ic">${icon}</span>
        <span class="g2-name">${name}</span>
        <span class="g2-pct" style="color:${pcol}">${tgt?pr.toFixed(0)+'%':'—'}</span></div>
      <div class="g2-numrow">ผลงานสะสม <b>${nf(val)}</b> จากเป้า ${nf(tgt)} ${unit}</div>
      <div class="g2-bar"><div class="g2-fill ${cat}" style="width:${p}%"></div></div>
      ${dists}
    </div>`;
  };
  return `<div class="card">
    <h3 style="color:var(--ink)"><span style="color:var(--enf)">${ic('flag')}</span> การดำเนินงานตามเป้าหมาย${infoDot('goal')}</h3>
    <p class="csub">เป้าตามแผน มิ.ย.–ก.ย. ${s.year} • สะสมทั้งปีงบประมาณ</p>
    ${panel('enf',ic('shield'),'จับกุมคดียาเสพติด (ข้อหาร้ายแรง)',dealTot,tgtDeal,'ราย','dealers',TARGET.dealers)}
    ${panel('tx',ic('treat'),'การบำบัดฟื้นฟู (นำผู้เสพเข้าบำบัด)',treatTot,tgtTreat,'คน','intoTreatment',TARGET.treat)}
  </div>`;
}
function trendCard(s){return`<div class="card">

function drawTrend(s){
  const ctx=document.getElementById('cTrend');if(!ctx)return;
  let labels=[],cases=[],treat=[];
  if(s.month===0){for(let m=1;m<=12;m++){const g=aggLatest(filt(s.year,m,s.district));labels.push(SM[m]);cases.push(g.cases);treat.push(g.intoTreatment);}}
  else{for(let w=1;w<=5;w++){const g=sum(ALL.filter(r=>r.year===s.year&&r.month===s.month&&r.week===w&&(s.district==='all'||r.district===s.district)));
        labels.push('สัปดาห์ '+w);cases.push(g.cases);treat.push(g.intoTreatment);}}
  const barColors=(s.month!==0&&s.week>0)?[1,2,3,4,5].map(w=>w===s.week?cssv('--gold'):cssv('--enf')):cssv('--enf');
  mk('cTrend',{type:'bar',data:{labels,datasets:[
    {label:'คดีจับกุม',data:cases,backgroundColor:barColors,borderRadius:6,maxBarThickness:36},

}

function notesCard(s){
  const src=filt(s.year,s.month,s.district,s.week);
  const items=[];
  src.forEach(r=>{
    if(r.notes&&String(r.notes).trim())items.push({r,txt:r.notes,ag:'',agc:''});
    if(r.notesPolice&&String(r.notesPolice).trim())items.push({r,txt:r.notesPolice,ag:'ตำรวจภูธรฯ',agc:'agpol'});
    if(r.notesHealth&&String(r.notesHealth).trim())items.push({r,txt:r.notesHealth,ag:'สสจ.',agc:'aghea'});
  });
  items.sort((a,b)=>(b.r.updatedAt||'').localeCompare(a.r.updatedAt||''));
  const body=items.length?items.map(({r,txt,ag,agc})=>`<div class="fitem">
    <div class="fhead"><span class="chip">${r.district}</span>${ag?`<span class="agchip ${agc}">${ag}</span>`:''}
      <span class="fper">${ic('calendar')} ${SM[r.month]} ${r.year} • สัปดาห์ ${r.week}</span></div>
    <div class="ftxt">${esc(txt)}</div>
    <div class="fby">โดย ${esc(r.updatedBy||'-')} • ${fmtTime(r.updatedAt)}</div></div>`).join('')
    :`<div class="feedempty">— ยังไม่มีบันทึกเหตุการณ์ในช่วงที่เลือก —</div>`;
  return`<div class="card">
    <h3><span style="color:var(--watch)">${ic('note')}</span> บันทึกเหตุการณ์สำคัญรายสัปดาห์</h3>

    <div class="feed">${body}</div></div>`;
}

const YM=[
 {key:'cases',label:'จำนวนคดี',unit:'คดี',color:'--enf',icon:'cases',tone:'enf'},
 {key:'suspects',label:'จำนวนผู้ต้องหา',unit:'คน',color:'--watch',icon:'suspect',tone:'watch'},

];
function pctTxt(c,p){if(!p)return'<span class="flat">—</span>';const d=(c-p)/p*100;const cls=d>0?'up':d<0?'down':'flat';
  return `<span class="${cls}" style="font-weight:600">${d>0?'▲':d<0?'▼':'—'} ${Math.abs(d).toFixed(1)}%</span>`;}
/* ===== เกจวัดผลเทียบเป้า รายอำเภอ ===== */
function gaugeOne(name,val,tgt,unit){
  const CX=100,CY=100,R=70,W=15,START=225,SWEEP=270;
  const pol=(deg,r)=>[CX+r*Math.cos(deg*Math.PI/180), CY-r*Math.sin(deg*Math.PI/180)];
  const degOf=t=>START-SWEEP*Math.max(0,Math.min(1,t));
  const arcP=(t1,t2,r)=>{const a=pol(degOf(t1),r),b=pol(degOf(t2),r);const large=(SWEEP*(t2-t1))>180?1:0;return `M${a[0].toFixed(2)} ${a[1].toFixed(2)} A${r} ${r} 0 ${large} 1 ${b[0].toFixed(2)} ${b[1].toFixed(2)}`;};
  const pct=tgt?val/tgt*100:0, vf=tgt?Math.max(0,Math.min(val/tgt,1)):0;
  const perf=!tgt?'#9aa4b4':pct>=90?'#12a150':pct>=60?'#e08a1e':'#d43f37';
  const zones=tgt?
    `<path d="${arcP(0,0.6,R)}" stroke="#e0503a" stroke-width="${W}" fill="none"/>`+
    `<path d="${arcP(0.6,0.9,R)}" stroke="#e8a33d" stroke-width="${W}" fill="none"/>`+
    `<path d="${arcP(0.9,1,R)}" stroke="#2bb673" stroke-width="${W}" fill="none"/>`
    :`<path d="${arcP(0,1,R)}" stroke="var(--line)" stroke-width="${W}" fill="none"/>`;
  const valArc=(tgt&&vf>0)?`<path d="${arcP(0,vf,R-W/2-4)}" stroke="${perf}" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.9"/>`:'';
  let ticks='';
  for(let i=0;i<=10;i++){const d=degOf(i/10);const a=pol(d,R+W/2+2),b=pol(d,R+W/2+7),l=pol(d,R+W/2+15);
    ticks+=`<line x1="${a[0].toFixed(1)}" y1="${a[1].toFixed(1)}" x2="${b[0].toFixed(1)}" y2="${b[1].toFixed(1)}" stroke="#c3ccda" stroke-width="1.3"/>`+
      `<text x="${l[0].toFixed(1)}" y="${(l[1]+3).toFixed(1)}" text-anchor="middle" font-size="7.5" fill="#9aa4b4" font-family="Sarabun">${i*10}</text>`;}
  let needle='';
  if(tgt){const d=degOf(vf),tip=pol(d,R-8);const px=Math.cos((d+90)*Math.PI/180),py=-Math.sin((d+90)*Math.PI/180);
    needle=`<polygon points="${tip[0].toFixed(1)},${tip[1].toFixed(1)} ${(CX+4.5*px).toFixed(1)},${(CY+4.5*py).toFixed(1)} ${(CX-4.5*px).toFixed(1)},${(CY-4.5*py).toFixed(1)}" fill="var(--ink2)"/>`;}
  const stat=!tgt?'ไม่มีเป้า':pct>=100?'บรรลุเป้าแล้ว':pct>=90?'ใกล้เป้าหมาย':pct>=60?'กำลังดำเนินการ':'ต่ำกว่าเป้า';
  return `<div class="gauge" style="--gc:${perf}">
    <div class="g-name">${name}</div>
    <svg viewBox="0 0 200 172">
      ${zones}${valArc}${ticks}${needle}
      <circle cx="${CX}" cy="${CY}" r="7.5" fill="var(--ink2)"/><circle cx="${CX}" cy="${CY}" r="3.2" fill="#fff"/>
      <text x="100" y="152" text-anchor="middle" font-size="21" font-weight="800" font-family="Kanit" fill="${perf}">${tgt?pct.toFixed(0)+'%':'—'}</text>
    </svg>
    <div class="g-vals">ผล <b>${nf(val)}</b> / เป้า ${nf(tgt)} ${unit}</div>
    <div class="g-status" style="color:${perf};background:${hexMix(perf,'#ffffff',0.87)};border-color:${hexMix(perf,'#ffffff',0.6)}">${stat}</div>
  </div>`;
}

/* ---------- สถานะการส่งข้อมูลรายสัปดาห์ ---------- */
function submissionCard(s){
  const scope=filt(s.year,s.month,'all',s.week);
  let maxT=-1,per=null;
  scope.forEach(r=>{const t=r.year*10000+r.month*100+r.week;if(t>maxT){maxT=t;per={y:r.year,m:r.month,w:r.week};}});
  let chips,done=0,perLabel='—';
  if(!per){chips=DISTRICTS.map(d=>`<span class="schip miss">${ic('clock')} ${d}</span>`).join('');}
  else{
    perLabel=`${SM[per.m]} ${per.y} • สัปดาห์ ${per.w}`;
    const sub=new Set(scope.filter(r=>r.year===per.y&&r.month===per.m&&r.week===per.w).map(r=>r.district));
    done=sub.size;
    chips=DISTRICTS.map(d=>sub.has(d)
      ?`<span class="schip ok">${ic('check')} ${d}</span>`
      :`<span class="schip miss">${ic('clock')} ${d}</span>`).join('');
  }
  const pctDone=Math.round(done/DISTRICTS.length*100);
  return`<div class="card subcard">
    <div class="subhead">
      <h3 style="margin:0"><span style="color:var(--tx)">${ic('check')}</span> สถานะการส่งข้อมูลรายสัปดาห์${infoDot('submission')}</h3>
      <div class="subcount"><b style="color:${done===6?'var(--tx)':done>0?'var(--watch)':'var(--enf)'}">${done}/6</b> อำเภอ • รอบ ${perLabel}</div>
    </div>
    <div class="track" style="margin:10px 0 14px"><div class="fill tx" style="width:${pctDone}%"></div></div>
    <div class="schips">${chips}</div></div>`;

const DIST_COLOR={'เมืองหนองบัวลำภู':'#2f6fb0','ศรีบุญเรือง':'#0e8a6b','นากลาง':'#cf8a1e','โนนสัง':'#c0392b','สุวรรณคูหา':'#7b54b8','นาวัง':'#1aa3a3'};
function admName(p){return p.ADM2_TH||p.adm2_th||p.AP_TN||'';}
/* ===== แผนที่ความเข้มข้น (choropleth) ===== */
const MAP_METRICS=[
  {k:'cases',l:'คดีจับกุม',u:'คดี',hi:'#9e2b20'},
  {k:'suspects',l:'ผู้ต้องหา',u:'คน',hi:'#a4660f'},
  {k:'meth',l:'ยาบ้า',u:'เม็ด',hi:'#1c4a7e'},
  {k:'ice',l:'ไอซ์',u:'กรัม',hi:'#0c7a5d'},
  {k:'treat',l:'ผ่านการบำบัด',u:'คน',hi:'#15603f'}
];
const _MK={cases:'c',suspects:'s',meth:'m',ice:'i'};
function mapVal(k,d){
  if(k==='treat')return (PLAN_TREAT[d]&&PLAN_TREAT[d].p69)||0;
  const a=PLAN_ARREST[d]&&PLAN_ARREST[d].y69;return a?(a[_MK[k]]||0):0;
}
function hexMix(a,b,t){a=a.replace('#','');b=b.replace('#','');const p=(h,i)=>parseInt(h.substr(i,2),16);
  const r=Math.round(p(a,0)+(p(b,0)-p(a,0))*t),g=Math.round(p(a,2)+(p(b,2)-p(a,2))*t),c=Math.round(p(a,4)+(p(b,4)-p(a,4))*t);
  return '#'+[r,g,c].map(x=>x.toString(16).padStart(2,'0')).join('');}
function paintMap(){
  const lay=window.__mapLayer;if(!lay)return;
  const mk=window.__mapMetric||'cases',M=MAP_METRICS.find(x=>x.k===mk)||MAP_METRICS[0];
  const max=Math.max(1,...DISTRICTS.map(d=>mapVal(mk,d)));
  lay.eachLayer(ly=>{const d=admName(ly.feature.properties);const v=mapVal(mk,d);const t=max>0?v/max:0;
    ly.setStyle({fillColor:hexMix('#edf1f6',M.hi,Math.max(0.05,t)),weight:1.3,color:'#ffffff',fillOpacity:.9});
    const a=(PLAN_ARREST[d]&&PLAN_ARREST[d].y69)||{},tr=(PLAN_TREAT[d]&&PLAN_TREAT[d].p69)||0;
    const fmt=mk==='ice'?Number(v).toLocaleString('th-TH'):nf(v);
    ly.setTooltipContent(`<div class="mtt"><b>${d}</b>`+
      `<div class="mtt-hi" style="color:${M.hi}">${M.l}: ${fmt} ${M.u}</div>`+
      `<div class="mtt-sub">คดี ${nf(a.c||0)} • ผู้ต้องหา ${nf(a.s||0)}<br>ยาบ้า ${nf(a.m||0)} เม็ด • ไอซ์ ${Number(a.i||0).toLocaleString('th-TH')} ก.<br>ผ่านการบำบัด ${nf(tr)} คน</div></div>`);
  });
  const leg=document.getElementById('mapLegend');
  if(leg){const maxTxt=mk==='ice'?Number(max).toLocaleString('th-TH'):nf(max);
    leg.innerHTML=`<div class="mlg-t" style="color:${M.hi}">${M.l} (${M.u}) — ปีงบประมาณ 2569</div>`+
      `<div class="mlg-bar" style="background:linear-gradient(90deg,${hexMix('#edf1f6',M.hi,0.06)},${M.hi})"></div>`+
      `<div class="mlg-sc"><span>น้อย · 0</span><span>มาก · ${maxTxt}</span></div>`;}
}
function setMapMetric(k){window.__mapMetric=k;document.querySelectorAll('[data-mm]').forEach(b=>b.classList.toggle('on',b.dataset.mm===k));paintMap();}
function mapCard(){
  const m=window.__mapMetric||'cases';
  const b=x=>`<button class="rkbtn ${m===x.k?'on':''}" data-mm="${x.k}" onclick="setMapMetric('${x.k}')">${x.l}</button>`;
  return`<div class="card">
  <div class="rkhead"><h3><span style="color:var(--seize)">${ic('building')}</span> แผนที่ความเข้มข้นรายอำเภอ${infoDot('map')}</h3>
    <div class="rkbtns">${MAP_METRICS.map(b).join('')}</div></div>
  <p class="csub">สีเข้ม = ค่าสูง · สีอ่อน = ค่าต่ำ • แตะ/วางเมาส์บนพื้นที่เพื่อดูข้อมูลรายอำเภอ</p>
  <div id="map" style="height:380px;border-radius:12px;overflow:hidden;border:1px solid var(--line)"></div>
  <div class="maplegend2" id="mapLegend"></div>
</div>`;}
function drawMap(s){
  const el=document.getElementById('map');if(!el||typeof L==='undefined')return;
  if(el._leaflet_id){paintMap();return;}
  const map=L.map(el,{scrollWheelZoom:false,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(map);
  const layer=L.geoJSON(NBL_GEO,{
    style:()=>({fillColor:'#edf1f6',weight:1.3,color:'#ffffff',fillOpacity:.9}),
    onEachFeature:(ft,ly)=>{ly.bindTooltip('',{sticky:true,direction:'top',className:'mtt-wrap'});
      ly.on('mouseover',()=>ly.setStyle({weight:2.6,fillOpacity:1}));
      ly.on('mouseout',()=>ly.setStyle({weight:1.3,fillOpacity:.9}));}
  }).addTo(map);
  window.__mapLayer=layer;
  try{map.fitBounds(layer.getBounds(),{padding:[10,10]});}catch(e){}
  paintMap();
  setTimeout(()=>map.invalidateSize(),250);
}

function rankCard(){const m=window.__rankMetric||'cases';
  const b=(k,l)=>`<button class="rkbtn ${m===k?'on':''}" data-m="${k}" onclick="setRank('${k}')">${l}</button>`;
  const s=window.__curS;
  const has=s?DISTRICTS.some(d=>(aggLatest(filt(s.year,s.month,d,s.week))[m]||0)>0):false;
  return`<div class="card"><div class="rkhead">
      <h3><span style="color:var(--watch)">${ic('flag')}</span> อันดับอำเภอ${infoDot('rank')}</h3>

function toggleFull(){const el=document.documentElement;

function animateCounts(){
  if(typeof requestAnimationFrame==='undefined')return;
  const nodes=[...document.querySelectorAll('.cnt')];
  const sig=nodes.map(n=>n.dataset.c).join('|');
  if(sig===window.__cntSig)return; window.__cntSig=sig;
  nodes.forEach(n=>{const to=parseFloat(n.dataset.c)||0,dec=+n.dataset.d||0;tween(n,0,to,dec,700);});
}
function tween(node,from,to,dec,dur){const t0=performance.now();
  function fmt(v){return Number(dec?(+v).toFixed(dec):Math.round(v)).toLocaleString('th-TH',{minimumFractionDigits:dec,maximumFractionDigits:dec});}
  function step(t){const p=Math.min((t-t0)/dur,1),e=1-Math.pow(1-p,3);node.textContent=fmt(from+(to-from)*e);
    if(p<1)requestAnimationFrame(step);else node.textContent=fmt(to);}
  requestAnimationFrame(step);}

    <div style="overflow-x:auto"><table class="psytbl">

/* ===================== AI สรุป ===================== */
function aiSummary(s,c,p,curLabel,prevLabel,ySum,curRows){
  const lines=[],plain=[];const has=curRows.length>0;
  const scope=s.district==='all'?'ทั้งจังหวัด':'อำเภอ'+s.district;
  if(!has){lines.push({t:`ยัง<b>ไม่มีข้อมูล</b>สำหรับ ${curLabel} (${scope}) — กรุณากรอกข้อมูลผ่านระบบเพื่อให้แดชบอร์ดประมวลผล`});}
  else{
    lines.push({t:`สถานการณ์ ${scope} ช่วง <b>${curLabel}</b>: จับกุม <span class="hl">${nf(c.cases)} คดี</span> ผู้ต้องหา ${nf(c.suspects)} คน • นำผู้เสพเข้าบำบัด <span class="hl">${nf(c.intoTreatment)} คน</span> (สำเร็จ ${nf(c.completedTreatment)}) • ของกลางยาบ้า ${nf(c.methPills)} เม็ด ไอซ์ ${c.iceGrams.toLocaleString('th-TH')} กรัม`});
    plain.push(`ภาพรวม ${scope} ${curLabel}: คดี ${nf(c.cases)} | ผู้ต้องหา ${nf(c.suspects)} | บำบัด ${nf(c.intoTreatment)} (สำเร็จ ${nf(c.completedTreatment)}) | ยาบ้า ${nf(c.methPills)} เม็ด | ไอซ์ ${c.iceGrams} ก.`);
    if(p&&(p.cases||p.intoTreatment)){
      const dc=pct(c.cases,p.cases),dt=pct(c.intoTreatment,p.intoTreatment);
      lines.push({t:`เทียบ ${prevLabel}: คดีจับกุม${arrow(dc)} <b>${absT(dc)}</b> • การนำเข้าบำบัด${arrow(dt)} <b>${absT(dt)}</b>`});
      plain.push(`เทียบ ${prevLabel}: คดี ${arrowT(dc)}${absT(dc)}, บำบัด ${arrowT(dt)}${absT(dt)}`);
    }
    if(s.district==='all'){
      const byD=DISTRICTS.map(d=>({d,g:aggLatest(curRows.filter(r=>r.district===d))}));
      const tc=[...byD].sort((a,b)=>b.g.cases-a.g.cases)[0],tt=[...byD].sort((a,b)=>b.g.intoTreatment-a.g.intoTreatment)[0];
      if(tc.g.cases>0)lines.push({t:`พื้นที่จับกุมสูงสุด: <span class="hl">${tc.d}</span> (${nf(tc.g.cases)} คดี) • นำเข้าบำบัดสูงสุด: <span class="hl">${tt.d}</span> (${nf(tt.g.intoTreatment)} คน)`});
      if(tc.g.cases>0)plain.push(`จับกุมสูงสุด: ${tc.d} ${nf(tc.g.cases)} คดี | บำบัดสูงสุด: ${tt.d} ${nf(tt.g.intoTreatment)} คน`);
    }
    const tgtDeal=s.district==='all'?TARGET_SUM.dealers:(TARGET.dealers[s.district]||0);
    const tgtTreat=s.district==='all'?TARGET_SUM.treat:(TARGET.treat[s.district]||0);
    const pD=tgtDeal?ySum.dealers/tgtDeal*100:0,pT=tgtTreat?ySum.intoTreatment/tgtTreat*100:0;
    lines.push({t:`ความคืบหน้าสะสมเทียบเป้า: จับกุมคดีข้อหาร้ายแรง <b>${pD.toFixed(0)}%</b> (${nf(ySum.dealers)}/${nf(tgtDeal)}) • บำบัดฟื้นฟู <b>${pT.toFixed(0)}%</b> (${nf(ySum.intoTreatment)}/${nf(tgtTreat)})`});
    plain.push(`คืบหน้าเป้า: ผู้ค้า ${pD.toFixed(0)}% | บำบัด ${pT.toFixed(0)}%`);
    const w=[];
    if(pT<50)w.push('การบำบัดต่ำกว่าครึ่งของเป้า ควรเร่งคัดกรองและนำผู้เสพเข้าระบบ');
    if(pD<50)w.push('การจับกุมคดีข้อหาร้ายแรงยังห่างเป้า ควรเร่งสืบสวนขยายผล');
    if(c.psychiatric>0)w.push(`พบผู้มีอาการจิตเวช (SMI-V) ${nf(c.psychiatric)} คน — ติดตามดูแลต่อเนื่องเพื่อลดความเสี่ยงในชุมชน`);
    if(w.length){lines.push({t:`<span class="hl">ข้อควรเร่งรัด:</span> ${w.join(' • ')}`,warn:true});plain.push('ข้อควรเร่งรัด: '+w.join('; '));}
    const ev=[];curRows.forEach(r=>{if(r.notes&&String(r.notes).trim())ev.push(`${r.district}: ${String(r.notes).trim()}`);if(r.notesPolice&&String(r.notesPolice).trim())ev.push(`${r.district} (ตร.): ${String(r.notesPolice).trim()}`);if(r.notesHealth&&String(r.notesHealth).trim())ev.push(`${r.district} (สสจ.): ${String(r.notesHealth).trim()}`);});
    if(ev.length){lines.push({t:`เหตุการณ์สำคัญ: ${ev.slice(0,3).join(' / ')}${ev.length>3?' …':''}`});plain.push('เหตุการณ์สำคัญ: '+ev.slice(0,3).join(' / '));}
  }
  window.__plain=`สรุปสถานการณ์ยาเสพติด จ.หนองบัวลำภู — ${curLabel} (${scope})\n`+plain.map(x=>'• '+x).join('\n')+`\n(ออกรายงานโดยระบบแดชบอร์ด ${new Date().toLocaleString('th-TH')})`;
  window.__aiStats={ช่วงเวลา:curLabel,พื้นที่:scope,คดีจับกุม:c.cases,ผู้ต้องหา:c.suspects,ผู้ค้ารายสำคัญ:c.dealers,
    ยาบ้าเม็ด:c.methPills,ไอซ์กรัม:c.iceGrams,นำเข้าบำบัด:c.intoTreatment,สำเร็จบำบัด:c.completedTreatment,
    คัดกรอง:c.xray,จิตเวช:c.psychiatric,สะสมผู้ค้าทั้งปี:ySum.dealers,สะสมบำบัดทั้งปี:ySum.intoTreatment};
  return`<div class="ai">
    <div class="aibtns">
      <button class="copybtn" onclick="copyReport()">${ic('note')} คัดลอก</button>
      <button class="copybtn" onclick="aiAdvanced(this)">${ic('ai')} สรุปด้วย AI ขั้นสูง</button>
    </div>
    <h2><span class="iccirc">${ic('ai')}</span> บทสรุปผู้บริหาร ${infoDot('ai')}<span class="badge">AI วิเคราะห์อัตโนมัติ</span></h2>
    <p class="period">${curLabel} • ${scope}</p>
    <div class="body" id="aiBody">${lines.map(l=>`<span class="ln${l.warn?' warn':''}">${l.t}</span>`).join('')}</div></div>`;
}
function copyReport(){navigator.clipboard.writeText(window.__plain||'').then(()=>toast('คัดลอกรายงานสำหรับส่งต่อแล้ว'));}
async function aiAdvanced(btn){
  btn.disabled=true;const orig=btn.innerHTML;btn.innerHTML='⏳ กำลังประมวลผล...';
  try{
    const d=await jsonp({action:'ai',data:JSON.stringify(window.__aiStats||{})});
    if(d.ok&&d.summary){
      const body=document.getElementById('aiBody');
      body.innerHTML=d.summary.split(/\n+/).filter(x=>x.trim()).map(x=>`<span class="ln">${x.replace(/[<>]/g,'')}</span>`).join('');
      toast('สรุปด้วย AI ขั้นสูงแล้ว');
    }else toast(d.error||'AI ขั้นสูงยังไม่พร้อม (ตั้งค่า ANTHROPIC_KEY)');
  }catch(e){toast('เชื่อมต่อ AI ไม่สำเร็จ');}
  finally{btn.disabled=false;btn.innerHTML=orig;}
}

/* ===================== utils ===================== */
function pct(c,p){return p?(c-p)/p*100:null;}
function absT(d){return d===null?'(ใหม่)':Math.abs(d).toFixed(1)+'%';}
function arrow(d){return d===null?'':d>0?' เพิ่มขึ้น':d<0?' ลดลง':' คงที่';}
function arrowT(d){return d===null?'+':d>0?'▲':d<0?'▼':'=';}
function nf(v){return (Number(v)||0).toLocaleString('th-TH');}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmtTime(iso){if(!iso)return'-';const d=new Date(iso);return d.toLocaleDateString('th-TH',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});}
function cssv(n){return getComputedStyle(document.body).getPropertyValue(n).trim()||'#888';}
function baseOpt(extra){return Object.assign({responsive:true,maintainAspectRatio:false,
  plugins:{legend:{labels:{font:{family:'Sarabun',size:12},color:cssv('--ink2'),boxWidth:13,padding:14}}},
  scales:{x:{ticks:{font:{family:'Sarabun',size:11},color:cssv('--muted')},grid:{display:false}},
          y:{ticks:{font:{family:'Sarabun',size:11},color:cssv('--muted')},grid:{color:cssv('--line')},beginAtZero:true}}},extra||{});}
/* แกนหมวดหมู่แนวตั้ง (ชื่ออำเภอ) — กันความกว้างไว้ไม่ให้ตัวอักษรถูกตัดบนมือถือ */
function catY(){var mob=(typeof window!=='undefined'&&window.innerWidth<600);
  /* ปลดเพดานความกว้างแกนก่อน fit เพื่อไม่ให้ Chart ตัดชื่ออำเภอ แล้วให้มันปรับขนาดเองตามชื่อจริง */
  return {maxWidth:mob?150:190,
    beforeFit:function(sc){sc.maxWidth=mob?150:190;},
    ticks:{autoSkip:false,padding:6,crossAlign:'far',mirror:false,
      font:{family:'Sarabun',size:mob?11:12},color:cssv('--ink2')},
    grid:{display:false}};}
function mk(id,cfg){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id),cfg);}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}
function toggleTheme(){const d=document.body.getAttribute('data-theme')==='dark';
  document.body.setAttribute('data-theme',d?'light':'dark');paintStatic();render();}
function exportCSV(){
  const head=['ปี','เดือน','สัปดาห์','อำเภอ','คดี','ผู้ต้องหา','ผู้ค้า','ยาบ้า_เม็ด','ไอซ์_กรัม','นำเข้าบำบัด','ผ่านการบำบัด','คัดกรอง','จิตเวช','คัดกรองจิต','หมายเหตุ','หมายเหตุ ตร.','หมายเหตุ สสจ.','ผู้กรอก','อัปเดต'];
  const lines=ALL.map(r=>[r.year,r.month,r.week,r.district,r.cases,r.suspects,r.dealers,r.methPills,r.iceGrams,
    r.intoTreatment,r.completedTreatment,r.xray,r.psychiatric,r.psychScreen,'"'+String(r.notes||'').replace(/"/g,'""')+'"','"'+String(r.notesPolice||'').replace(/"/g,'""')+'"','"'+String(r.notesHealth||'').replace(/"/g,'""')+'"','"'+String(r.updatedBy||'').replace(/"/g,'""')+'"',r.updatedAt]);
  const csv='\uFEFF'+[head,...lines].map(a=>a.join(',')).join('\n');
  const b=new Blob([csv],{type:'text/csv;charset=utf-8'}),u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download='drug_situation_nbl_'+Date.now()+'.csv';a.click();URL.revokeObjectURL(u);toast('ส่งออก CSV แล้ว');
}
